<!DOCTYPE html>
<html>

<head>
  <title>Welcome – Connect to Internet</title>
</head>

<body>
  <h1>Welcome to MyHotspot</h1>
  <p>Click below to accept our terms and access the internet.</p>
  <button onclick="grantAccess()">Accept & Connect</button>

  <script>
    function grantAccess() {
      const params = new URLSearchParams(window.location.search);
      const authaction = params.get('authaction');
      const tok = params.get('tok');
      const redir = params.get('redir') || 'http://example.com';

      if (authaction && tok) {
        // Redirect to the router's auth endpoint
        window.location.href = authaction + '&tok=' + tok + '&redir=' + encodeURIComponent(redir);
      } else {
        alert('Error: missing auth parameters.');
      }
    }
  </script>
</body>

</html>
